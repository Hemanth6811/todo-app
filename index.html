<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Character encoding — handles all special characters -->
  <meta charset="UTF-8" />

  <!-- Makes the page look correct on mobile screens -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>My To-Do App</title>

  <!-- Link our CSS file -->
  <link rel="stylesheet" href="style.css" />

  <!-- Google Fonts: Playfair Display (title) + Nunito (body) -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet" />
</head>
<body>

  <!--
  ====================================================
  THE ENTIRE APP LIVES INSIDE THIS ONE CARD (.app-wrapper)
  
  Structure:
  ┌─────────────────────────────────┐
  │  .app-header  (colorful top)    │
  │    - title                      │
  │    - stats row (total/done)     │
  ├─────────────────────────────────┤
  │  .main-content (white area)     │
  │    - add task input + button    │
  │    - filter tabs                │
  │    - task list                  │
  │    - footer button              │
  └─────────────────────────────────┘
  ====================================================
  -->
  <div class="app-wrapper">

    <!-- ========================================
         HEADER — colorful top section of card
    ========================================= -->
    <header class="app-header">

      <!-- App Title -->
      <h1 class="app-title">My Tasks</h1>

      <!-- Subtitle: how many tasks left to do -->
      <p class="task-counter" id="taskCounter">0 tasks remaining</p>

      <!-- Stats Row: 3 small boxes showing task counts -->
      <div class="stats-row">
        <div class="stat-box">
          <span class="stat-number" id="statTotal">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-box">
          <span class="stat-number" id="statActive">0</span>
          <span class="stat-label">Active</span>
        </div>
        <div class="stat-box">
          <span class="stat-number" id="statDone">0</span>
          <span class="stat-label">Done</span>
        </div>
      </div>

    </header><!-- end .app-header -->


    <!-- ========================================
         MAIN CONTENT — everything below header
    ========================================= -->
    <div class="main-content">

      <!-- ADD TASK: input box + Add button -->
      <div class="add-task-section">
        <input
          type="text"
          id="taskInput"
          class="task-input"
          placeholder="Add a new task..."
          maxlength="100"
        />
        <button class="add-btn" onclick="addTask()">+ Add</button>
      </div>

      <!-- FILTER TABS: All / Active / Done -->
      <div class="filter-bar">
        <button class="filter-btn active" id="filter-all"    onclick="filterTasks('all')">All</button>
        <button class="filter-btn"        id="filter-active" onclick="filterTasks('active')">Active</button>
        <button class="filter-btn"        id="filter-done"   onclick="filterTasks('done')">Done</button>
      </div>

      <!-- TASK LIST: tasks are added here by JavaScript -->
      <ul class="task-list" id="taskList">
        <!-- JavaScript fills this in automatically -->
      </ul>

      <!-- EMPTY STATE: shown when no tasks exist -->
      <div class="empty-state" id="emptyState">
        <span class="empty-icon">📋</span>
        <p>No tasks here. Add one above!</p>
      </div>

      <!-- FOOTER: clear completed tasks -->
      <div class="footer-actions">
        <button class="clear-btn" onclick="clearCompleted()">Clear Completed</button>
      </div>

    </div><!-- end .main-content -->

  </div><!-- end .app-wrapper -->

  <!-- JavaScript file — placed at bottom so HTML loads first -->
  <script src="script.js"></script>

</body>
</html>
